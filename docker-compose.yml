services:
  auth:
    build:
      context: ./src/AuthService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

  processor:
    build:
      context: ./src/DataProcessorService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  gateway:
    build:
      context: ./src/GatewayService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  products:
    build:
      context: .
      dockerfile: src/ProductService/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDb__ConnectionString=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
      tests:
        condition: service_completed_successfully
  #      auth:
  #        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })" ]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - API_URL=http://products:8080
      - VITE_AUTH_API_URL=http://auth:8080
      - VITE_PROCESSOR_API_URL=http://processor:8080
      - VITE_GATEWAY_API_URL=http://gateway:8080
      - VITE_PRODUCT_API_URL=http://products:8080
    depends_on:
      - products

  tests:
    depends_on:
      mongo:
        condition: service_healthy
    build:
      context: .
      dockerfile: tests/ProductService.Dal.Tests/Dockerfile

volumes:
  mongo_data:
